services:
  # ─────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - backend_data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/neeraj.db

  # ─────────────────────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
    depends_on:
      - backend

  # ─────────────────────────────────────────────
  # Postiz — Social Media Scheduler
  # ─────────────────────────────────────────────
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postiz:postiz@postiz-db:5432/postiz
      - REDIS_URL=redis://postiz-redis:6379
      - JWT_SECRET=change_this_secret
      - FRONTEND_URL=http://postiz:5000
      - NEXT_PUBLIC_BACKEND_URL=http://postiz:5000
      # Facebook + Instagram (Business method) — same Meta app for both
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID:-}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET:-}
      # Instagram Standalone (optional — only if not using Facebook Business method)
      - INSTAGRAM_APP_ID=${INSTAGRAM_APP_ID:-}
      - INSTAGRAM_APP_SECRET=${INSTAGRAM_APP_SECRET:-}
      # Google (shared by YouTube + Google My Business — enable all required APIs on one project)
      - GOOGLE_CLIENT_ID=${POSTIZ_GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${POSTIZ_GOOGLE_CLIENT_SECRET:-}
    depends_on:
      - postiz-db
      - postiz-redis

  postiz-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postiz
      - POSTGRES_PASSWORD=postiz
      - POSTGRES_DB=postiz
    volumes:
      - postiz_db:/var/lib/postgresql/data

  postiz-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - postiz_redis:/data

volumes:
  backend_data:
  postiz_db:
  postiz_redis:
